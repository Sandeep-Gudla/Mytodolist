<!DOCTYPE html>
<html lang="en">
<script type="module" src="app.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            color: #666;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 0;
        }
        
        .stat-card .label {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            text-transform: uppercase;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .input-row input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .input-row input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-row button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .input-row button:hover {
            background: #5568d3;
        }
        
        .input-row button:active {
            transform: scale(0.95);
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            transition: all 0.2s ease;
        }
        
        .task-item:hover {
            background: #f9f9f9;
            border-color: #667eea;
        }
        
        .task-item.completed {
            opacity: 0.6;
            background: #f5f5f5;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }
        
        .task-text {
            flex: 1;
            font-size: 15px;
            color: #333;
            word-break: break-word;
        }
        
        .task-delete {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: #999;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .task-delete:hover {
            background: #ffe0e0;
            color: #d32f2f;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state p {
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <p class="number" id="total-count">0</p>
                <p class="label">Total</p>
            </div>
            <div class="stat-card">
                <p class="number" id="completed-count">0</p>
                <p class="label">Done</p>
            </div>
            <div class="stat-card">
                <p class="number" id="remaining-count">0</p>
                <p class="label">Left</p>
            </div>
        </div>

        <div class="input-row">

    <input
        type="text"
        id="task-input"
        placeholder="What needs to be done?"
    />

    <input
        type="text"
        id="assigned-to"
        placeholder="Assign To"
    />

    <button onclick="addTask()">
        Add
    </button>

</div>

<div style="margin-bottom:20px;">

    <button id="login-btn">
        Login With Google
    </button>

    <span id="user-name"></span>

</div>

        <div class="task-list" id="task-list">
            <div class="empty-state">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>
        </div>
    </div>
</body>
</html>
